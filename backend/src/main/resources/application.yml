spring:
  application:
    name: backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sp2i_build}
    username: ${SPRING_DATASOURCE_USERNAME:sp2i}
    password: ${SPRING_DATASOURCE_PASSWORD:sp2i}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      # Les DQE PDF reels depassent facilement 1 Mo.
      # On augmente donc la taille acceptee pour permettre
      # une integration complete des documents de chantier.
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.sp2i: INFO

app:
  cors:
    allowed-origins: ${SP2I_CORS_ALLOWED_ORIGINS:https://*.vercel.app,http://localhost:5173,http://127.0.0.1:5173}

security:
  jwt:
    secret: ${SP2I_JWT_SECRET:sp2i-build-demo-secret-key-sp2i-build-demo-secret-key}
    expiration-ms: ${SP2I_JWT_EXPIRATION_MS:86400000}

import-cost:
  transport-rate: 0.08
  insurance-rate: 0.02
  douane-rate: 0.15
  port-rate: 0.05
  local-transport-rate: 0.05
  margin-rate: 0.10

tesseract:
  datapath: ${SP2I_TESSERACT_DATAPATH:}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4.1-mini}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}
