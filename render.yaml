services:
  - type: web
    name: sp2i-build-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: sp2i-build-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: sp2i-build-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: sp2i-build-db
          property: password
      - key: SP2I_CORS_ALLOWED_ORIGINS
        value: https://*.vercel.app,https://sp2i-build-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: SP2I_JWT_SECRET
        sync: false

  - type: web
    name: sp2i-build-frontend
    runtime: static
    rootDir: ./frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sp2i-build-backend
          property: host
      - key: VITE_BACKEND_LABEL
        fromService:
          type: web
          name: sp2i-build-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sp2i-build-db
    plan: free
